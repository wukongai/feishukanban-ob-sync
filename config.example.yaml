# feishukanban-ob-sync v0.2.0 配置文件示例
# ============================================================
# 使用方法:
#   1. cp config.example.yaml config.yaml
#   2. 把所有 <your_xxx> 占位符替换成你的真实值
#   3. 详细字段说明见 docs/feishu-schema.md
#   4. config.yaml 已被 .gitignore 屏蔽,不会被 commit
# ============================================================

# 飞书项目同步 - 配置文件
# 作用:把"绑定哪张多维表 + 字段映射"等可变项抽到 yaml,以后切换表只改这里(对应架构原则 #7 高复用修复)

# === 飞书侧 ===
feishu:
  # 多维表 base_token(从 wiki 节点解析得到)
  base_token: <your_base_token>
  table_id: <your_table_id>
  table_name: 项目管理
  # 主视图 ID(用于拼链接,新建 record 后让链接默认打开此视图)
  default_view_id: <your_view_id>
  # 飞书租户域名(用于拼 URL)
  tenant_domain: <your_tenant>.feishu.cn
  # wiki 节点 token(用于拼 wiki 形式的长 URL)
  wiki_node_token: <your_wiki_node_token>

  # === 飞书云文档(2026-05-17 Phase 1.7 升级)===
  # 把 OB 交付物 .md 推到飞书云文档,「交付」字段用云文档 URL 替代死链 wikilink
  # 解决 obsidian:// 在飞书 security 跳转下完全失效的问题(2026-05-17 事故)
  # 默认 folder = null = 飞书云空间根目录;想归档到指定文件夹改 folder_token
  doc_folder_token: null
  # 云文档 URL 模板(变量: {doc_token})
  doc_url_template: "https://feishu.cn/docx/{doc_token}"
  # 是否启用飞书云文档同步(true = sync 时把 .md 推送到飞书 + 交付字段用云文档 URL)
  enable_doc_sync: true

# === 字段映射 ===
# OB 笔记里的信号 → 飞书表的字段名
fields:
  # 必填:任务标题(从 markdown 链接的 text 部分抽)
  title: 任务标题

  # 完成状态(单选/多选,enum: Todo/Doing/SubDone/Done/Block/Idea/cancel)
  status:
    field_name: 执行状态
    # journal 模式(老接口)inline char → 飞书 enum 4 态
    map:
      "[ ]": Todo
      "[/]": Doing
      "[x]": Done
      "[-]": Block
    # v0.3.5(2026-05-27):task md 模式 frontmatter.status → 飞书 enum 7 态直接对齐
    # 优先用此 map(parse_task_md_for_push 带出 fm_status);journal 模式无 fm_status 走 map 老接口
    task_md_map:
      todo: Todo
      doing: Doing
      subdone: SubDone
      done: Done
      block: Block
      cancel: cancel       # 飞书侧手建是小写,保留(避免 SDK 大小写敏感不匹配)
      idea: Idea

  # 完成时间(datetime,从 Tasks 插件 ✅ YYYY-MM-DD emoji 抽)
  done_date:
    field_name: 完成时间
    emoji: "✅"

  # 创建时间(datetime,从 Tasks 插件 ➕ YYYY-MM-DD 抽)
  created_date:
    field_name: 创建时间  # 飞书表里如果没有此字段,会被静默跳过
    emoji: "➕"

  # 优先级映射(默认禁用!)
  # 原因:OB Tasks 插件的 🔺⏫🔼🔽 语义是"紧急度",飞书的"价值优先级"语义是"商业价值",两者不一定等价
  # 你想统一时:把 field_name 改成 "价值优先级" 并加 emoji_map 映射
  priority:
    field_name: null  # null = 禁用此映射,不写"价值优先级"字段
    emoji_map:
      "🔺": P0
      "⏫": P1
      "🔼": P2
      "🔽": P3

  # 交付字段(text)
  # D 混合架构:扫 3 种 OB 端表达方式,合并 union 去重后写入
  #   A 路径(同行 wikilink):task 行内 📎 后跟 [[xxx]] 多个
  #   B 路径(callout 块):task 行下方紧跟的 callout
  #   C 路径(反向 frontmatter):全 vault 扫 frontmatter `delivery_for: [<record_id>]`
  delivery:
    field_name: 交付
    # B 路径:检测的 callout 类型(出现任一即抽)
    callout_types:
      - success
      - done
      - note
    # A 路径:同行 wikilink 的 emoji 触发符(后跟 [[xxx]] 才识别)
    inline_emoji: "📎"
    # C 路径:frontmatter 字段名(笔记里的反向链接字段)
    backlink_field: delivery_for
    # 飞书侧展示格式 - markdown 列表 + 原话备注
    # 模板变量:{items_md} {original_text} {sync_date}
    # items_md = "- [[xxx.md]] 教程文档\n- [[yyy.py]] 同步脚本"
    # original_text = 飞书侧手工填的"原话"(不含 wikilink 时保留;含 wikilink 时丢弃旧自动生成的部分)
    format_template: |-
      交付物:
      {items_md}

      ——自动同步 {sync_date}——
    # 当飞书侧已有手工值且不含 wikilink 时,追加格式(交付物列表在前,原话备注在后)
    append_template: |-
      交付物:
      {items_md}

      原话备注: {original_text}

      ——自动同步 {sync_date}——

  # 复盘字段
  # 用户决策(2026-05-17):取消 sync 自动填 —— 复盘是「人进行的反思」,留给手填心得
  # 字段分工:交付 = 机器忙(扫 OB 产物自动填); 复盘 = 人进行(去飞书后台手填)
  # 想恢复自动填:把 field_name 改回 "复盘" + 用 template "[[journals/{date}]]"
  retrospective:
    field_name: null  # null = 禁用此字段自动填
    template: "[[journals/{date}]]"

  # 执行迭代周(单选 enum, 基于完成日 ✅ 反推所在 ISO 周)
  # 2026-05-18 上线 - 用户截图发现"涉及周看板"重要,详见:
  #   spec: 04 Inbox/superpowers/specs/2026-05-18-飞书项目同步-执行迭代周月-自动写入设计.md
  # derive 候选词模板: {YY}W{NN:02d}  例: 26W20 (YY=年后2位, NN=ISO week number 0填充2位)
  # cli search-options 用候选词模糊匹配 → 遍历 options 找第一个 query in name 的 → 取其 name
  # 未命中(飞书没建该周 enum)→ 静默跳过,该 task 此字段不写
  # 关闭此字段自动填: field_name: null
  iteration_week:
    field_name: 执行迭代周
    field_id: <your_iter_week_field_id>            # cli search-options 必填,从 feishu-cli bitable field list 拿
    derive_template: "{YY}W{NN:02d}"

  # 执行迭代月(单选 enum, 基于完成日 ✅ 所在月份)
  # derive 候选词模板: "{YY} 年 {M} 月"  例: 26 年 5 月
  # (注意中英文混排有半角空格, 符合 base-and-frontmatter.md 中英文混排空格规范)
  iteration_month:
    field_name: 执行迭代月
    field_id: <your_iter_month_field_id>
    derive_template: "{YY} 年 {M} 月"

# === task md 模式专属字段(2026-05-25 上线) ===
# 这些字段只在 `python3 sync.py --task-md <path>` 模式下生效
# journal inline task 模式没有这些字段(用 H1 单标题 + emoji 元数据,不支持详细分类)
# 详见 rules/feishu-project-sync.md「task md 化架构」section
task_md_fields:
  # task md 文件名 → 标题(去掉 YYYY-MM-DD- 前缀);frontmatter title 字段优先
  # 飞书"任务标题"字段已由通用 title 处理,这里只列 task md 专属

  # priority(P0/P1/P2/P3 → 飞书"价值优先级")
  # 用户拍板:task md ↔ 飞书对齐,priority 直接映射
  # journal 模式仍由全局 priority 配置控制(默认禁用,避免覆盖飞书后台手动评估)
  priority_str:
    field_name: 价值优先级
  category:
    field_name: 大类               # select(单)
  subcategory:
    field_name: 小类               # select(多)— v0.3.8 起淡化使用,新 task 推荐用 project_minor
  # v0.3.8 加:项目小类(task 表 multi-select enum)
  # 用于「任务内容细分类型」三级分类(项目 > 子级 > 项目小类),如:
  #   布丁内容(子级) → 干货 / 训练营 / 课程产品 (项目小类)
  #   装备配置(子级) → Codex / claudecode / 软硬件 (项目小类)
  # 跟「小类」(field [3])平级但语义更精细;Cmd+P 快记任务弹最近 5 个 distinct 用过
  project_minor:
    field_name: 项目小类           # select(多)— v0.3.8 加
  adhd_priority:
    field_name: ADHD优先级         # select(单)
  estimate_hours:
    field_name: 估时               # number
  efficiency:
    field_name: 完成效率           # select(单): 高/中/低
  acceptance:
    field_name: 验收条件           # text(从 task md「## ✅ 验收条件」段抽)
  thinking:
    field_name: 执行思路           # text(从 task md「## 💡 执行思路」段抽)
  resources:
    field_name: 相关资料           # text(从 task md「## 🔗 相关资料」段抽)
  retrospective_text:
    field_name: 复盘               # text(从 task md「## 🪞 复盘」段抽)
  execution_summary:
    field_name: 执行概述           # text(从 task md「## 📝 执行概述」段抽,也是正文主体)

  # === 2026-05-28 v0.4.0 加:5 字段补全(OB ↔ 飞书 1:1 闭环)===

  # quality(完成质量):task md frontmatter `quality` → 飞书「完成质量」select(高/中/低)
  # 完成 task 时回填
  quality:
    field_name: 完成质量            # select(单)— null = 跳过

  # actual_hours(实际用时):task md frontmatter `actual_hours: 1.5` → 飞书「用时」number
  # 完成 task 时回填
  actual_hours:
    field_name: 用时                # number — null = 跳过

  # parent_task(父任务):task md frontmatter `parent_task: "[[<父 task 文件名>]]"`
  # → 飞书「父任务」link 字段(单向 子→父,自关联到本表,WBS 任务拆解层级)
  # ⚠️ 2026-06-01 改正:飞书有「父任务」(单向,扛父子层级)和「相关任务」(双向,扛同级关联)两个字段
  #    parent_task 走「父任务」才有方向;「相关任务」留给同级横向关联
  # sync.py 流程:
  #   1. wikilink 解析 → 取 stem(如 "2026-05-28-test1")
  #   2. vault `04 Inbox/task/<stem>.md` 直接找,失败 fallback rglob 该目录
  #   3. 读其 frontmatter.feishu_record → 飞书 link 字段写 [rec_id](数组形式)
  #   4. 父 task 无 feishu_record / 找不到 → warning + 跳过该字段(其他字段不阻断)
  parent_task:
    field_name: 父任务              # link 单向(子→父,自关联本表)— null = 跳过

  # delivery(交付正文段):task md「## 📦 交付」H2 段内容 → 飞书「交付」text
  # ⭐ 用户视角"最重要字段";反向 pull-today 也拉回此段
  # 注:跟顶层 fields.delivery(D 混合架构,journal inline 模式专用)是两套独立配置
  # task md 模式优先 H2 段;journal inline 模式仍走 D 混合(扫 wikilink / callout / backlinks)
  delivery:
    field_name: 交付                # text — null = 跳过

  # user_story(用户故事正文段):task md「## 👥 用户故事」H2 段内容 → 飞书「用户故事」text
  # 可选,产品类 task 用("作为 X,我希望 Y,以便 Z"句式)
  user_story:
    field_name: 用户故事            # text — null = 跳过

  # due(截止日期):飞书表暂无对应字段。等用户在后台加 datetime 字段后填 field_name
  due:
    field_name: null               # null = 跳过

  # today_flag(是否今日):2026-05-26 v0.2.4 加 — checkbox 字段
  # task md frontmatter `today: true/false` → 飞书 checkbox 字段
  # 用于"创建 task 时立即标记今日"的工作流(免去回飞书 app 手动勾)
  today_flag:
    field_name: 是否今日             # checkbox 字段名;null = 禁用

  # parent_project(归属大项目):2026-05-26 v0.2.2 加 / v0.2.3 修(支持 link 字段)
  # task md frontmatter `parent_project: "[[<项目名>]]"` → 飞书 link 字段(双向关联到「项目」表)
  # Cmd+P「📝 快记任务」创建 task 时弹大项目选择菜单,自动填这里
  #
  # 支持两种字段类型(根据飞书实际字段类型选一种配置):
  #
  # 【类型 A】link(双向关联,推荐)— 飞书侧有独立的「项目表」管理所有大项目
  #   sync.py 会:
  #     1. 用 strip_prefix_regex 去 OB 项目名前缀(如 "00 布丁" → "布丁",可选)
  #     2. 在 link_table_id 表里按 link_table_name_field 精确匹配 → 拿 record_id
  #     3. 匹配失败 → 跳过该字段并打 warning(不影响其他字段同步)
  parent_project:
    field_name: 产品项目                  # link 字段名 — null = 跳过同步
    link_table_id: tblXXXXXXXXXX          # 关联表 table_id(从 feishu-cli bitable table list 拿)
    link_table_name_field: 产品项目名      # 关联表里项目名字段
    link_table_parent_field: 父产品        # 关联表里"父产品"字段名(用于二级菜单查子 record;无需二级则不用此字段)
    # v0.3.5 加:关联表里 checkbox 字段名,标识项目当前是否活跃
    # Cmd+P 快记任务弹大类/小类菜单时只显示活跃项目(归档项目自动隐藏)
    # 留空 '' 或注释掉 → 不过滤,所有项目都显示(向后兼容 v0.3.4 及之前)
    link_table_active_field: 当前是否活跃
    strip_prefix_regex: '^\d+\s+'         # OB 端项目名前缀正则(去 "00 " "01 " 等;留空字符串 '' 禁用)

    # v0.2.4 加:override_map — OB 项目名 → 飞书 record 名直接映射
    # 用于 OB 项目名 ≠ 飞书 record 名 / 强制归到某二级 record 的场景
    # userscript 命中 override → 不弹二级菜单 / 标题加【effective_name】前缀
    # 不需要此 feature → 留空 {} 或注释掉
    override_map:
      # 例:OB 项目 "myproject1" 的任务都归到飞书「产品 A 开发」record
      # myproject1: 产品 A 开发
  #
  # 【类型 B】select(单选,简单场景)— 飞书侧用 select enum 直接选项目
  #   只配 field_name 即可,留空 link_table_id 等字段就走 select 模式
  #   parent_project:
  #     field_name: 项目             # select 字段名
  #     # link_table_id: null         # 注释掉或不填即走 select 模式

# === 执行明细子表(daily execution log)===
# v0.6.0(2026-05-29)上线:每条 task 关联 N 条「执行明细」record,每条 = 1 天的执行情况
# 解决:原 task md frontmatter 只存 status 终极值,看不到"那天的状态"
# OB 端用 task md 「## 📈 执行明细」段表达;飞书侧用主表「执行明细」link 字段关联子表
#
# 段格式(OB 端,v0.6.7 起 key 中文化 + 状态去 emoji):
#   ## 📈 执行明细
#
#   - 2026-05-28 | Doing | 计划=推 push-all bug 修复 / 估时=2 / 用时=1.5 / 完成度=标准完成 / 复盘=跑了 dry-run
#   - 2026-05-29 | Done  | 用时=3 / 完成度=超额完成 / 复盘=上线了
#
# 规则:
#   - 日期 | 状态(首字母大写英文)| key=val / key=val / ...(对齐子表 schema:计划→估时→用时→完成度→复盘)
#   - 主键 = (task record_id, 日期);同日 OB 重写 → 飞书侧覆盖
#   - 不写的 key 不推(空字段保护,跟主字段映射同款防御)
#   - 兼容老英文 key(plan/est/act/done/review):解析 OK,下次 push 自动 normalize 为中文
#
# 留空 table_id '' 或注释整段 → 禁用此功能(向后兼容 v0.5.x)
execution_detail:
  table_id: tblXXXXXXXXXX                  # 子表 table_id(从 feishu-cli bitable table list 拿)
  link_field_on_main: 执行明细              # 主表里关联到子表的 link 字段名

  # 子表字段映射(OB key → 飞书字段名);留空 field_name '' → 该字段不推/不拉
  fields:
    link_back:
      field_name: 任务                     # 子表里关联回主表的 link 字段(必填,不可禁用)
    date:
      field_name: 日期                     # datetime 字段,毫秒时间戳
    status:
      field_name: 执行状态                  # select(v0.6.0 新加);OB 小写 → 飞书首字母大写
      map:
        todo: Todo
        doing: Doing
        subdone: SubDone
        done: Done
        block: Block
        cancel: cancel                    # 飞书侧手建小写,保留(避免 SDK 大小写敏感)
        idea: Idea
    plan:
      field_name: 计划&策略                 # text — OB 端 `计划=...`(老 `plan=` 仍兼容)
    review:
      field_name: 执行&复盘                 # text — OB 端 `复盘=...`(老 `review=` 仍兼容)
    estimate_hours:
      field_name: 估时                     # number — OB 端 `估时=...`(老 `est=` 仍兼容)
    actual_hours:
      field_name: 用时                     # number — OB 端 `用时=...`(老 `act=` 仍兼容)
    completion:
      field_name: 完成度                   # select — OB 端 `完成度=...`(老 `done=` 仍兼容)
      # 飞书选项:最小完成 / 标准完成 / 超额完成 / 阻碍 / 未启动 — OB 直填中文,不做映射

# === 反向同步(飞书 → OB) ===
# 2026-05-18 Phase 2.2 上线
# 详见 spec: 04 Inbox/superpowers/specs/2026-05-18-sync.py-反向 pull 实现-设计.md
reverse:
  # 默认 filter: 飞书侧 "是否今日" 字段为 true 的 task
  # 简单版: 不支持 cli flag override (sync.py --pull 始终用这个)
  # 实施时: client-side filter (拉全表后 Python 端判 truthy)
  default_filter:
    field_name: 是否今日
    truthy: true

  # 反向字段映射: 飞书字段 → OB Tasks 行结构
  field_to_ob:
    title_field: 任务标题
    status_field: 执行状态
    # 飞书状态 → OB checkbox char
    # fallback: 飞书 Done 但 完成时间空 → 降级为 " " ([ ] 未完成) + dry-run 警告
    status_map:
      Done: "x"
      Todo: " "
      Doing: "/"
      SubDone: "/"        # v0.3.5(2026-05-27):inline 视觉同 doing,frontmatter 端保留 subdone 语义
      Block: "-"
      Idea: " "
      cancel: "-"
    done_date_field: 完成时间
    priority_field: 价值优先级
    # 飞书价值优先级 → OB Tasks 优先级 emoji
    # 空 → 不写 emoji, 落「🐿️ 非计划」段
    priority_map:
      P0: "🔺"
      P1: "⏫"
      P2: "🔼"
      P3: "🔽"
    # 2026-05-28 v0.4.0 加:补 5 字段反向同步配置(纯文档,_extract_fields_from_feishu_row 内部 hard-code)
    # 这些字段已加入 _REVERSE_SYNC_FIELD_WHITELIST(frontmatter 3 个)
    # + _REVERSE_SYNC_H2_WHITELIST(正文 H2 段 2 个)
    quality_field: 完成质量
    actual_hours_field: 用时
    parent_task_field: 父任务        # 飞书「父任务」单向 link(子→父层级)
    delivery_field: 交付
    user_story_field: 用户故事

  # 写入位置策略
  write_target:
    # 默认 today journal (sync.py 启动时取 datetime.now())
    journal_dir: journals
    date_format: "%Y-%m-%d"
    # 段落锚点: 有 emoji 写到「🎯 今日计划」, 无 emoji 写到「🐿️ 今日非计划」
    section_with_priority: "## 🎯 今日计划"
    section_no_priority: "## 🐿️ 今日非计划"

  # 查重策略 (2026-05-18 rule 坑 #8 教训)
  dedup:
    # 按标题"前缀关键词"(去掉【】+ 取前 N 字)做 grep 全 vault journals/
    # 命中老 task → 升级老 task 的短链为新 wiki 长链(让老 task 进入 sync.py 可管理范围)
    # 不写新 task 到今日 (避免重复)
    title_prefix_chars: 10
    on_match: upgrade_short_to_long  # 唯一支持的策略

  # fallback 行为 (2026-05-18 D7 决策)
  fallback:
    # 飞书 Done 但完成时间空 → OB 写 [ ] 未完成 (不写 [x] + 不写 ✅)
    done_without_date: skip_checkmark
    warn: true  # dry-run 加 ⚠️ 警告

# === OB 侧 ===
ob:
  # task 行的 markdown 链接需要匹配的 URL 前缀(用来识别"这行是不是飞书项目 task")
  link_url_prefix:
    - "https://vbn7n4vn7h.feishu.cn/record/"
    - "https://vbn7n4vn7h.feishu.cn/wiki/PAtUwFxlLiIgcwkK5ixcIRuJnHb"

  # Obsidian vault 名(用于 URL Scheme,如果用 obsidian:// 时需要)
  # 注:obsidian:// 在飞书 security 跳转下完全失效(2026-05-17 事故),已默认关闭
  # 现在主用飞书云文档 URL(feishu.doc_url_template),只有 doc 推送失败时才降级到 wikilink
  vault_name: OB
  use_obsidian_uri: false  # ⚠️ 飞书 security 会破坏 obsidian:// 协议,禁用

  # 默认日志目录(Phase 2 反向同步:写入此目录下的 YYYY-MM-DD.md)
  journal_dir: journals
  # 反向同步写入位置(用 H2/H3 锚定)
  pull_anchor: "🎯 今日计划"
  pull_anchor_level: "##"  # 或 ###/####

  # 反向同步默认时间窗口(天)
  pull_default_days: 7

# === 行为开关 ===
behavior:
  # 跨周/月的 enum 选项不存在时,是否自动新建(false = 静默跳过,只填能填的字段)
  auto_create_enum: false
  # cli 命令失败时是否中断(false = 继续处理下一条 task)
  fail_fast: false
  # dry-run 时是否详细打印每个字段的 before → after
  verbose_diff: true

  # v0.5.4(2026-05-30):时区配置 — 用来算 sync.py "今日" 日期
  # 默认 Asia/Shanghai(跟飞书 + Obsidian Daily Notes(userscript +8h)对齐)
  # 跨时区工作场景(mac TZ=PDT 但飞书+Daily Notes 用 BJ)→ 必须 BJ,不能用 local
  # 仅在你确实想跟 mac 系统本地时区对齐时显式设 `local`
  # - 'Asia/Shanghai'(默认 v0.5.4+): 强制北京时间
  # - 'local': mac 系统本地时区(仅推荐 mac 时区 == 工作时区时用)
  # - 'America/Los_Angeles' / 'America/New_York' / 其他 IANA: 强制该时区
  timezone: Asia/Shanghai
